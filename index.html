<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>HIGH SCORE:
                        <span id="high-score"></span>
                    </h3>
                    
                </div>
                <div class="info">
                    <h3>SCORE:
                        <span id="score"></span>
                    </h3>
                    
                </div>
                <div class="info">
                    <h3>TIME:
                        <span id="time">00:00</span>
                    </h3>
                    
                </div>
            </div>
            <div class="board">  
            </div>
        </section>
        <div class="modal">
            <div class="start-game">
                <h3 class="snkgm">The Snake Game</h3>
                <div class="btndiv">
                <button class="btn btn-start">Start Game</button>
                    </div>
            </div>
            <div class="game-over">
                <div class="reh3"><h3 class="snkgm">Game Over</h3></div>
                <button class="btn btn-restart">Restart</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    
</body>
</html>
